<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Heart Vision | 2D Hand Detection</title>

  <style>
    :root {
      --w: 720px;
      --h: 540px;
      --accent: #ff4bb4;
      --bg: #0f172a;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top right, #1e293b, #0f172a);
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    #app-wrapper {
      display: flex;
      gap: 24px;
      padding: 24px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    #container { 
      position: relative; 
      width: var(--w); 
      height: var(--h);
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    /* Video is hidden; canvas is used for rendering */
    video, canvas {
      width: var(--w);
      height: var(--h);
      display: block;
    }
    video { display: none; }

    /* Right Side Panel */
    #sidebar {
      display: flex;
      flex-direction: column;
      width: 280px;
      gap: 20px;
    }

    h1 {
      font-size: 1.5rem;
      margin: 0;
      background: linear-gradient(to right, #ff4b2b, #ff416c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    /* Mode buttons */
    #controls { 
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      cursor: pointer;
      background: rgba(255,255,255,0.05);
      color: white;
      font-weight: 600;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }

    button:active { transform: translateY(0); }

    button.active { 
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(255, 75, 180, 0.4);
    }

    #btnCapture { background: #10b981; border-color: #10b981; grid-column: span 2; }
    #btnReset { background: #64748b; border-color: #64748b; }

    .status-panel {
      background: rgba(0,0,0,0.2);
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--glass-border);
    }

    .debug {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      color: #94a3b8;
      margin-top: 8px;
      word-break: break-all;
    }

    #info {
      font-size: 13px;
      line-height: 1.6;
      color: #cbd5e1;
    }

    #info b { color: var(--accent); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      background: #1e293b;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
  </style>
</head>

<body>
  <div id="app-wrapper">
    <div id="container">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
    </div>

    <div id="sidebar">
      <div>
        <h1>Heart Vision</h1>
        <p style="font-size: 12px; color: #64748b;">MediaPipe 2D Pose & Gesture</p>
      </div>

      <div class="status-panel">
        <span class="badge">System Status</span>
        <div class="debug" id="debugReadout">Initializing camera...</div>
        <div class="debug" id="modeLabel" style="color: #38bdf8;">Mode: Hand</div>
      </div>

      <div id="controls">
        <button id="btnHand" class="active">✌️ Gesture</button>
        <button id="btnReset">🔄 Reset</button>
        <button id="btnCapture">📸 Capture Screenshot</button>
      </div>

      <div id="info">
        <span class="badge">How to play</span>
        <p>Make a <b>Peace Sign (✌️)</b> to trigger the floating heart sticker. The sticker will track your <b>chest position</b> using pose detection.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

  <script>
  (async function(){
    /* ------------------------------
        Canvas & DOM setup
    --------------------------------*/
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = 720;
    canvas.height = 540;

    const btnHand = document.getElementById('btnHand');
    const btnCapture = document.getElementById('btnCapture');
    const btnReset = document.getElementById('btnReset');
    const modeLabel = document.getElementById('modeLabel');
    const debugReadout = document.getElementById('debugReadout');

    /* Image Setup*/
    const colors = ['red', 'pink', 'orange'];
    const img = new Image();
    let glowColor = null;

    function setRandomColor(){
      const randomColor = colors[Math.floor(Math.random() * colors.length)];
      if (randomColor == 'red') {
        glowColor = "hsl(0, 70%, 80%)"; 
        img.src = 'heart_red.png';
      } else if (randomColor == 'pink') {
        glowColor = "hsl(330, 70%, 80%)";
        img.src = 'heart_pink.png';
      } else if (randomColor == 'orange') {
        glowColor = "hsl(25, 80%, 80%)";
        img.src = 'heart_orange.png';
      } else {
        glowColor = null;
        img.src = 'heart.png';
      } 
    }
    setRandomColor();

    let imageLoaded = false;
    let showImage = false;
    let mode = 'hand';

    function setMode(m){
      mode = m;
      btnHand.classList.toggle('active', m === 'hand');
      modeLabel.textContent = `Mode: ${m.charAt(0).toUpperCase() + m.slice(1)}`;
    }

    btnHand.onclick = () => setMode('hand');
    btnCapture.onclick = captureImage;
    btnReset.onclick = resetImage;

    function resetImage() {
      showImage = false;
      setRandomColor();
    }

    let transform = {
      tx: canvas.width / 2,
      ty: canvas.height / 2,
      scale: 1.0,
      angle: 0
    };

    const baseRect = { w: 200, h: 200 };

    function dist(a, b){
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return Math.sqrt(dx*dx + dy*dy);
    }

    /* ------------------------------
        MediaPipe Setup
    --------------------------------*/
    const hands = new Hands({
      locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.6
    });

    const pose = new Pose({
      locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    img.onload = () => { imageLoaded = true; };

    async function startCamera(){
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 1280, height: 720, facingMode: "user" },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        debugReadout.textContent = "Camera Active";

        let isWarmingUp = true;

        const camera = new Camera(video, {
          onFrame: async () => {
            if (isWarmingUp) {
              // Run them sequentially only for the very first frame to safely init WASM
              await hands.send({ image: video });
              await pose.send({ image: video });
              isWarmingUp = false;
            } else {
              // Now that they are initialized, run in parallel for performance
              await Promise.all([
                hands.send({ image: video }),
                pose.send({ image: video })
              ]);
            }
          }
        });
        camera.start();
      } catch (err) {
        debugReadout.textContent = "Error: " + err.message;
      }
    }

    /* ------------------------------
        Pose results
    --------------------------------*/
    let chestCanvas = null;
    let shoulderDistPx = null;
    let poseLm = null;

    function getChestPosition(poseLm) {
      const left = poseLm[11];
      const right = poseLm[12];
      return { x: (left.x + right.x) / 2, y: (left.y + right.y) / 2 };
    }

    function poseToCanvas(p) {
      return { x: p.x * canvas.width, y: p.y * canvas.height };
    }

    function getShoulderDistance(poseLm) {
      const left = poseToCanvas(poseLm[11]);
      const right = poseToCanvas(poseLm[12]);
      return Math.hypot(left.x - right.x, left.y - right.y);
    }

    pose.onResults(results => {
      if (!results.poseLandmarks) return;
      poseLm = results.poseLandmarks;
      const chestNorm = getChestPosition(poseLm);
      chestCanvas = poseToCanvas(chestNorm);
      shoulderDistPx = getShoulderDistance(poseLm);
    });

    /* ------------------------------
        Hand results
    --------------------------------*/
    function isHandOutOfFrame(handLm, margin = 0.05) {
      const critical = [8, 12];
      return critical.some(i => {
        const p = handLm[i];
        return p.x < -margin || p.x > 1 + margin || p.y < -margin || p.y > 1 + margin;
      });
    }

    let lastFalseTime = 0;
    const FALSE_COOLDOWN = 1000;
    const SPREAD_ON = 0.27;
    const SPREAD_OFF = 0.22;
    const HOLD_ON = 0.18;
    const HOLD_OFF = 0.23;
    let isTarget = false;

    function updateGesture(isTarget) {
      const now = performance.now();
      if (isTarget){  
        showImage = true;
        return;
      }
      if (!isTarget && now - lastFalseTime >= FALSE_COOLDOWN) {
        resetImage();
        showImage = false;
        lastFalseTime = now;
      }
    }

    hands.onResults(results => {
      drawFrame(results);
      if (mode !== 'hand') return;

      const handsLm = results.multiHandLandmarks;
      if (!handsLm || handsLm.length === 0) {
        showImage = false;
        debugReadout.textContent = "Searching for hand...";
        return;
      }

      const lm = handsLm[0];
      if (isHandOutOfFrame(lm)) {
        showImage = false;
        debugReadout.textContent = "Hand out of frame";
        return;
      }
      debugReadout.textContent = "Hand detected";

      const toCanvas = p => ({ x: p.x * canvas.width, y: p.y * canvas.height });
      const thumb = toCanvas(lm[4]);
      const index = toCanvas(lm[8]);
      const middle = toCanvas(lm[12]);
      const ring = toCanvas(lm[16]);
      const pinky = toCanvas(lm[20]);
      const wrist = toCanvas(lm[0]);
      const handSize = dist(wrist, middle) || 1;
      
      if (!showImage) {
        isTarget = dist(middle, index)/handSize > SPREAD_ON &&
                   dist(index, thumb)/handSize > SPREAD_ON &&
                   dist(thumb, ring)/handSize < HOLD_ON &&
                   dist(pinky, ring)/handSize < HOLD_ON;
      } else {
        isTarget = dist(middle, index)/handSize > SPREAD_OFF &&
                   dist(index, thumb)/handSize > SPREAD_OFF &&
                   dist(thumb, ring)/handSize < HOLD_OFF &&
                   dist(pinky, ring)/handSize < HOLD_OFF;
      }
      updateGesture(isTarget);

      if (showImage && chestCanvas && shoulderDistPx) {
        transform.scale = shoulderDistPx / 320;
        transform.tx = chestCanvas.x - 50;
        transform.ty = chestCanvas.y - 50;
      }
    });

    function captureImage() {
      const imageURL = canvas.toDataURL("image/png");
      const link = document.createElement("a");
      link.href = imageURL;
      const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
      link.download = `heart_capture_${timestamp}.png`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function drawFrame(handResults){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      if (showImage && imageLoaded) {
        ctx.save();
        ctx.translate(transform.tx, transform.ty);
        ctx.rotate(transform.angle);
        ctx.scale(transform.scale, transform.scale);
        
        if (glowColor) {
          ctx.filter = `drop-shadow(0 0 20px ${glowColor})`;
        }
        
        ctx.drawImage(
          img,
          -baseRect.w / 2 + 180, 
          -baseRect.h / 2 + 180,
          baseRect.w,
          baseRect.h
        );
        ctx.restore();
      }
    }

    await startCamera();
  })();
  </script>
</body>
</html>

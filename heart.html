<!doctype html>
<html>
<head>
  <meta charset="utf-8" />

  <!-- Page title -->
  <title>2D ✌️ detection (MediaPipe JS)</title>

  <style>
    /* Canvas size variables */
    :root{--w:720px;--h:540px}

    /* Basic layout */
    body {
      font-family: Arial, Helvetica, sans-serif;
      background:#111;
      color:#eee;
      display:flex;
      align-items:flex-start;
      gap:16px;
      padding:12px;
    }

    #container { position:relative; width:var(--w); }

    /* Video is hidden; canvas is used for rendering */
    video, canvas {
      width:var(--w);
      height:var(--h);
      border-radius:8px;
      background:#222;
    }

    video { display:none; }

    /* Mode buttons */
    #controls { display:flex; gap:8px; margin-top:8px; }

    button {
      padding:8px 12px;
      border-radius:6px;
      border:none;
      cursor:pointer;
      background:#1f6feb;
      color:white;
    }

    button.active { background:#0ea5a4; }

    #info {
      margin-left:12px;
      max-width:360px;
      font-size:13px;
      line-height:1.4;
    }

    .debug {
      font-family:monospace;
      font-size:12px;
      background:rgba(0,0,0,0.36);
      padding:6px;
      border-radius:6px;
    }
  </style>
</head>

<body>
  <div id="container">

    <!-- Webcam stream (hidden, used as input for MediaPipe) -->
    <video id="video" autoplay playsinline></video>

    <!-- Main rendering surface -->
    <canvas id="canvas"></canvas>

    <!-- Mode controls -->
    <div id="controls">
      <button id="btnHand" class="active">Hand</button>
      <button id="btnCapture">Capture</button>
      <button id="btnReset">Reset</button>
      <label class="debug" id="modeLabel">Mode: Hand</label>
      
    </div>

    <!-- Debug output -->
    <div style="margin-top:8px;">
      <div class="debug" id="debugReadout">Waiting for camera...</div>
    </div>
  </div>

  <!-- Help text -->
  <div id="info">
    <h3>Controls</h3>
    <ul>
      <li><b>Hand - ✌️</b>: Heart</li>
      <li><b>Sticker - Heart's location</b></li>
    </ul>
  </div>

  <!-- MediaPipe libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

  <script>
  (async function(){

    /* ------------------------------
       Canvas & DOM setup
    --------------------------------*/
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = 720;
    canvas.height = 540;

    const btnHand = document.getElementById('btnHand');
    const btnCapture = document.getElementById('btnCapture');
    const btnReset = document.getElementById('btnReset');
    const modeLabel = document.getElementById('modeLabel');
    const debugReadout = document.getElementById('debugReadout');

    /* Image Setup*/
        /* Randomize color pool */
    const colors = ['red', 'pink', 'orange'];

    const img = new Image();
    let glowColor = null;

    function setRandomColor(){
      const randomColor = colors[Math.floor(Math.random() * colors.length)];
      if (randomColor == 'red')
      {
        glowColor = "hsl(0, 70%, 80%)"; 
        img.src = 'heart_red.png';
      }
      else if (randomColor == 'pink')
      {
        glowColor = "hsl(330, 70%, 80%)";
        img.src = 'heart_pink.png';
      }
      else if (randomColor == 'orange')
      {
        glowColor = "hsl(25, 80%, 80%)";
        img.src = 'heart_orange.png';
      }
      else
      {
        glowColor = null;
        img.src = 'heart.png';
      } 
    }
    setRandomColor();

    let imageLoaded = false;
    let showImage = false;     // controls hide / unhide

    /* Current interaction mode */
    let mode = 'hand';

    /* Switch between hand / face mode */
    function setMode(m){
      mode = m;
      btnHand.classList.toggle('active', m === 'hand');
      btnReset.classList.add('deactive');
    }

    btnHand.onclick = () => setMode('hand');
    btnCapture.onclick = captureImage;
    btnReset.onclick = resetImage;

    function resetImage() {
      showImage = false;
      setRandomColor();
      btnReset.classList.remove('active');
    }

    /* ------------------------------
       Transform state of rectangle
    --------------------------------*/
    let transform = {
      tx: canvas.width / 2,   // X position
      ty: canvas.height / 2,  // Y position
      scale: 1.0,             // Scale factor
      angle: 0                // Rotation (radians)
    };

    /* Base rectangle size */
    const baseRect = { w: 200, h: 200 };

    /* Distance helper */
    function dist(a, b){
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return Math.sqrt(dx*dx + dy*dy);
    }

    /* Compute average position of points */
    function centroid(points){
      let x = 0, y = 0;
      for (const p of points){
        x += p.x;
        y += p.y;
      }
      return { x: x / points.length, y: y / points.length };
    }

    /* ------------------------------
       MediaPipe Hands
    --------------------------------*/
    const hands = new Hands({
      locateFile: file =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.6
    });

    const pose = new Pose({
      locateFile: file =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });


    img.onload = () => {
      imageLoaded = true;
    };

    /* ------------------------------
       Camera setup
    --------------------------------*/
    async function startCamera(){
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: 1280, height: 720, facingMode: "user" },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      /* MediaPipe Camera helper */
    const camera = new Camera(video, {
      onFrame: async () => {
        await hands.send({ image: video });
        await pose.send({ image: video });
      }
    });

      camera.start();
    }

    /* ------------------------------
       Pose results handler
    --------------------------------*/
    let chestCanvas = null;
    let shoulderDistPx = null;
    let poseLm = null;

    function getChestPosition(poseLm) {
      const left = poseLm[11];  // left shoulder
      const right = poseLm[12]; // right shoulder

      return {
        x: (left.x + right.x) / 2,
        y: (left.y + right.y) / 2
      };
    }

    function poseToCanvas(p) {
      return {
        x: p.x * canvas.width,
        y: p.y * canvas.height
      };
    }

    function getShoulderDistance(poseLm) {
      const left = poseToCanvas(poseLm[11]);
      const right = poseToCanvas(poseLm[12]);

      return Math.hypot(left.x - right.x, left.y - right.y);
    }

    pose.onResults(results => {
      if (!results.poseLandmarks) return;

      poseLm = results.poseLandmarks;

      const chestNorm = getChestPosition(poseLm);
      chestCanvas = poseToCanvas(chestNorm);

      shoulderDistPx = getShoulderDistance(poseLm);
    });


    /* ------------------------------
       Hand results handler
    --------------------------------*/
    function isOutOfFrame(p, margin = 0.05) {
      return (
        p.x < -margin ||
        p.x > 1 + margin ||
        p.y < -margin ||
        p.y > 1 + margin
      );
    }

    function isHandOutOfFrame(handLm, margin = 0.05) {
      // wrist + fingertips (stable points)
      const critical = [8, 12];
      return critical.some(i => isOutOfFrame(handLm[i], margin));
    }

    let lastFalseTime = 0;
    const FALSE_COOLDOWN = 1000; // ms
    const SPREAD_ON  = 0.27;
    const SPREAD_OFF = 0.22;

    const HOLD_ON  = 0.18;
    const HOLD_OFF = 0.23;
    let isTarget = false;

    function updateGesture(isTarget) {
      const now = performance.now();; 

      if (isTarget){  
        showImage = true;
        return;
      }
      // Gesture is false → only accept it every false cooldown
      if (!isTarget && now - lastFalseTime >= FALSE_COOLDOWN) {
        resetImage();
        showImage = false;
        lastFalseTime = now;
      }
    }


    hands.onResults(results => {

      drawFrame(results, null);

      if (mode !== 'hand') return;

      const handsLm = results.multiHandLandmarks;
      if (!handsLm || handsLm.length === 0) {
        showImage = false;
        return;
      }

      const lm = handsLm[0];

      // Out-of-frame check
      if (isHandOutOfFrame(lm)) {
        lastPinchDist = null;
        lastFistCenter = null;
        showImage = false;
        debugReadout.textContent = "Hand out of frame";
        return;
      }

      /* Convert normalized landmark to canvas space */
      const toCanvas = p => ({
        x: p.x * canvas.width,
        y: p.y * canvas.height
      });

      /* Pinch detection */
      const thumb = toCanvas(lm[4]);
      const index = toCanvas(lm[8]);
      const middle = toCanvas(lm[12]);
      const ring = toCanvas(lm[16])
      const pinky = toCanvas(lm[20])

      const wrist = toCanvas(lm[0]);
      const handSize = dist(wrist, middle) || 1;
      
      /* Heart detection */
      if (!showImage) {
        isTarget =
          dist(middle, index)/handSize > SPREAD_ON &&
          dist(index, thumb)/handSize > SPREAD_ON &&
          dist(thumb, ring)/handSize < HOLD_ON &&
          dist(pinky, ring)/handSize < HOLD_ON;
      } else {
        isTarget =
          dist(middle, index)/handSize > SPREAD_OFF &&
          dist(index, thumb)/handSize > SPREAD_OFF &&
          dist(thumb, ring)/handSize < HOLD_OFF &&
          dist(pinky, ring)/handSize < HOLD_OFF;
      }
      updateGesture(isTarget);

      // ---------------------------------
      /*  Combine with body mesh translation */
      // ----------------------------------
      if (showImage && chestCanvas && shoulderDistPx) {

        // Tune multiplier to taste (0(big)-360(small))
        transform.scale = shoulderDistPx / 320;
        transform.tx = chestCanvas.x - 50;
        transform.ty = chestCanvas.y - 50; // lift heart above chest
      }

    });

    /* ------------------------------
       Capture screen button
    --------------------------------*/
    function captureImage() {
      // Convert canvas to image
      const imageURL = canvas.toDataURL("image/png");

      // Create temporary download link
      const link = document.createElement("a");
      link.href = imageURL;

      // Optional: auto filename with timestamp
      const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
      link.download = `heart_capture_${timestamp}.png`;

      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    
    /* ------------------------------
       Drawing function
    --------------------------------*/
    function drawFrame(handResults, faceResults){

      ctx.clearRect(0,0,canvas.width,canvas.height);

      /* Draw camera frame */
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      /* Draw transformed rectangle */
      ctx.save();
      ctx.translate(transform.tx, transform.ty);
      ctx.rotate(transform.angle);
      ctx.scale(transform.scale, transform.scale);

      ctx.fillStyle = "rgba(255,165,0,0.85)";
      ctx.strokeStyle = "rgba(0,0,0,0.7)";
      ctx.lineWidth = 4;

    /* ------------------------------
       Show heart
    --------------------------------*/
      if (showImage && imageLoaded) {

        if (glowColor) {
          ctx.filter = `drop-shadow(0 0 2em ${glowColor})`;
        }
        
        ctx.drawImage(
          img,
          -baseRect.w / 2 + 180,  // X position on canvas (destination X)
          -baseRect.h / 2 + 180, // Y position on canvas (destination Y)
          baseRect.w, // width
          baseRect.h // height
        );
      } 

      ctx.filter = "none";
      ctx.restore();
    }

    /* Start everything */
    await startCamera();

  })();
  </script>
</body>
</html>
